services:
  - type: web
    name: cpsa2025
    runtime: php
    plan: free
    buildCommand: |
      composer install --no-dev --optimize-autoloader
      php artisan key:generate --force
      php artisan config:clear
      php artisan migrate --force
      php artisan db:seed --class=RoleSeeder --force
      php artisan config:cache
      php artisan route:cache
      php artisan view:cache
    startCommand: php artisan serve --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_URL
        fromService:
          type: web
          name: cpsa2025
          property: host
      - key: DB_CONNECTION
        value: pgsql
      - key: QUEUE_CONNECTION
        value: sync
      - key: FILESYSTEM_DISK
        value: local
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
      - key: MAIL_MAILER
        value: log
      - key: LOG_CHANNEL
        value: stderr

databases:
  - name: cpsa-db
    plan: free
